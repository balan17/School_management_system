<!DOCTYPE html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<title>Create Student</title>
{% load static %}

<style>

body{
background-color:black;
color:white;
margin:0;
height:100vh;
overflow:hidden;
}

h1{
font-family:'Times New Roman', Times, serif;
font-size:45px;
font-weight:600;
color:red;
text-align:center;
}

/* navbar */

.custom-navbar{
background:linear-gradient(90deg,#0d1b2a,#1b263b,#415a77);
padding-top:18px;
padding-bottom:18px;
}

.navbar-brand{
font-size:26px;
font-weight:bold;
letter-spacing:1px;
}

.nav-link{
font-family:'Times New Roman', Times, serif;
font-size:24px;
font-weight:600;
color:white !important;
padding-left:22px !important;
padding-right:22px !important;
transition:0.3s;
}

.nav-link:hover{
color:#ffd60a !important;
transform:scale(1.05);
}

/* background section */

.stud-div{
min-height:calc(100vh - 80px);
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
url("{% static 'sms.jpg' %}");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
}

/* form */

form{
font-family:'Times New Roman', Times, serif;
font-size:20px;
font-weight:500;
color:red;
width:100%;
max-width:800px;
}

label{
color:white;
}

.form-control{
height:43px;
}

.form-check-label{
margin-left:5px;
white-space:nowrap;
}

</style>
</head>


<body>

<nav class="navbar navbar-expand-lg navbar-dark custom-navbar shadow sticky-top">
<div class="container-fluid px-5">

<a class="navbar-brand" href="#">🎓 My Portal</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbar">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="{% url 'admin_login' %}">Admin</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'staff_login' %}">Staff</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'student_login' %}">Student</a>
</li>

<li class="nav-item">
<a class="nav-link text-danger fw-bold" href="{% url 'home' %}">Logout</a>
</li>

</ul>

</div>
</div>
</nav>



<div class="stud-div">

<div>

<h1 class="mt-4 mb-3">Create Student</h1>

<form method="post" enctype="multipart/form-data" class="row g-5">
{% csrf_token %}
<div class="col-md-6">
<label class="form-label">UserId</label>
<input type="text" id="username" name="username" class="form-control" value="{{uid}}">
</div>
<div class="col-md-6">
<label class="form-label">Password</label>
<input type="password" id="password" name="password" class="form-control" readonly>

<div class="form-check mt-2">
<input type="checkbox" id="password-toggle" class="form-check-input password-toggle" onclick="togglePassword()">
<label class="form-check-label form-label">Show Password</label>
</div>

</div>


<div class="col-md-6">
<label class="form-label">Student Name</label>
<input type="text" id="student_name" name="student_name" class="form-control" onchange="autogen_password()">
</div>


<div class="col-md-6">
<label class="form-label">Student Fees</label>
<input type="text" id="student_fees" name="student_fees" class="form-control">
</div>


<div class="col-md-6">
<label class="form-label">Joining Date</label>
<input type="date" id="joining_date" name="joining_date" class="form-control">
</div>


<div class="col-md-6">
<label class="form-label">Upload Picture</label>
<input type="file" id="pic" name="pic" class="form-control">
</div>


<div class="col-12 text-center mt-2">
<input type="submit" value="Create" class="btn btn-primary px-4">
</div>


</form>

</div>

</div>



<script>

function autogen_password(){

var studentName=document.getElementById('student_name').value;
var studentId=document.getElementById('username').value;

var password=studentName.substring(0,4)+studentId.substring(studentId.length-2);

document.getElementById('password').value=password;

}

function togglePassword(){

var passwordField=document.getElementById('password');
var passwordToggle=document.getElementById('password-toggle');

if(passwordToggle.checked){
passwordField.type='text';
}
else{
passwordField.type='password';
}

}

</script>

</body>
</html>
