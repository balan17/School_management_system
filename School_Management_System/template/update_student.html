<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Update Student</title>
    {% load static %}
    <style>
        .main {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: black;
            height: 100vh;
        }

        .image-container {
            background-image: url('{% static 'port.jpg' %}');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            height: 100%;
            max-height: 400px;
            width: 100%;
            border-radius: 20px !important;
        }

        .main h1 {
            color: red;
            font-family: 'Times New Roman', Times, serif;
            font-size: 40px; /* Reduce font size */
            font-weight: 550;
            text-align: center;
            margin-bottom: 20px;
        }


        .form-container {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            color: cyan;
            max-width: 90%; /* Reduce form width */
            max-height: 400px; /* Restrict form height */
        }

        label {
            font-family: 'Times New Roman', Times, serif;
            font-size: 18px; /* Reduce label font size */
        }

        input[type="text"], input[type="date"] {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px; /* Reduce padding */
            font-size: 16px; /* Reduce font size */
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        input[type="submit"] {
            width: 100%;
            padding: 8px; /* Reduce button size */
            background-color: #007bff;
            color: white;
            font-size: 16px; /* Reduce font size */
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #0056b3;
        }

        .row {
            height: 100%;
        }


        .col-md-6 {
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 50%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="container-fluid main">
        <div class="row w-100">

            <div class="col-md-6 p-0">
                <div class="image-container">
                </div>
            </div>

            <div class="col-md-5 d-flex align-items-center">
                <div class="container form-container">
                    <h1>Update Student</h1>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="student_name">Student Name:</label>
                            <input type="text" id="student_name" name="student_name" value="{{ student.student_name }}">
                        </div>
                        <div class="mb-3">
                            <label for="student_fees">Student Fees:</label>
                            <input type="text" id="student_fees" name="student_fees" value="{{ student.student_fees }}">
                        </div>
                        <div class="mb-3">
                            <label for="joining_date">Joining Date:</label>
                            <input type="date" id="joining_date" name="joining_date" value="{{ student.joining_date }}">
                        </div>
                        <div class="mb-3">
                            <input type="submit" value="Update">
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXlRA3xS5fLEnKt6vJ0fHbKp6cdi06tvUh+8aN0Pp5uGb0ni1u9BOI+MFWCm" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGihiS3SchvLKA91fN8lCqd9p/74EihTHG1vX2KlvAK/JcL8G5YUnob/Ki0" crossorigin="anonymous"></script>
</body>
</html>
