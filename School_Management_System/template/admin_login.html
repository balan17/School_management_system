<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    {% load static %}
    <style>
        body{
    margin:0;
    overflow:hidden;
}
        .main {
            display: flex;
            justify-content: center;
            align-items: center;
            background-repeat: no-repeat;
            background-size: cover;
            min-height: calc(100vh - 80px);
            background-image: url('{% static 'world.jpg' %}');
        }
        h1 {
            text-align: top;
            padding: 20px 50px;
            color: red;
            font-family: 'Times New Roman', Times, serif;
            font-size: 50px;
            font-weight: 550;
        }
        form {
            text-align: center;
            padding: 20px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 24px;
            color: cyan;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
        }
        p {
            color: red; /* Add styling for error messages */
            font-weight: bold;
            text-align: center;
        }
        .custom-navbar {
            background: linear-gradient(90deg, #0d1b2a, #1b263b, #415a77);
            padding-top: 18px;
            padding-bottom: 18px;
        }
        /* Brand style */
        .navbar-brand {
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        /* Menu items */
        .nav-link {
            font-family: 'Times New Roman', Times, serif;
            font-size: 24px;
            font-weight: 600;
            color: white !important;
            padding-left: 22px !important;
            padding-right: 22px !important;
            transition: 0.3s;
        }
        /* Hover effect */
        .nav-link:hover {
            color: #ffd60a !important;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark custom-navbar shadow sticky-top">
    <div class="container">

        <a class="navbar-brand" href="#">🎓 My Portal</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbar">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'admin_login' %}">Admin</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'staff_login' %}">Staff</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'student_login' %}">Student</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-danger fw-bold" href="{% url 'home' %}">
                        Logout
                    </a>
                </li>

            </ul>
        </div>
    </div>
</nav>
{% load static %}
<div class="main">
    <div>
        <h1>Admin Login</h1>
        {% if error %}
            <p>{{ error }}</p>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="username" class="form-label">Username:</label>
                <input type="text" id="username" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password:</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            <input type="submit" class="btn btn-primary" value="Login">
        </form>
    </div>
</div>
</body>
</html>
