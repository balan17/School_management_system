<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <style>
        .main {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: red;
            font-family: 'Times New Roman', Times, serif;
            font-size: 3rem;
            font-weight: 550;
        }

        form {
            text-align: center;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
        }

        label, input {
            font-family: 'Times New Roman', Times, serif;
            font-size: 1.2rem;
            color: #333;
            width: 100%;
        }

        input[type="text"],
        input[type="password"] {
            margin-bottom: 20px;
            padding: 10px;
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        input[type="submit"] {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #0056b3;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            form {
                padding: 20px;
            }

            input[type="text"],
            input[type="password"],
            input[type="submit"] {
                font-size: 1rem;
            }
        }

        @media (max-width: 576px) {
            .main {
                padding: 10px;
            }

            form {
                max-width: 100%;
            }

            h1 {
                font-size: 1.8rem;
            }

            input[type="submit"] {
                font-size: 0.9rem;
            }
        }
        .custom-navbar {
            background: linear-gradient(90deg, #0d1b2a, #1b263b, #415a77);
            padding-top: 18px;
            padding-bottom: 18px;
        }
        /* Brand style */
        .navbar-brand {
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .nav-link {
            font-family: 'Times New Roman', Times, serif;
            font-size: 24px;
            font-weight: 600;
            color: white !important;
            padding-left: 22px !important;
            padding-right: 22px !important;
            transition: 0.3s;
        }
        .nav-link:hover {
            color: #ffd60a !important;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
{% load static %}
<nav class="navbar navbar-expand-lg navbar-dark custom-navbar shadow sticky-top">
    <div class="container">

        <a class="navbar-brand" href="#">🎓 My Portal</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbar">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'admin_login' %}">Admin</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'staff_login' %}">Staff</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'student_login' %}">Student</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-danger fw-bold" href="{% url 'home' %}">
                        Logout
                    </a>
                </li>

            </ul>
        </div>
    </div>
</nav>
<div class="main" style="background-image: url('{% static 'bac.jpg' %}');">
    <h1>Student Login</h1>
    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required><br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br><br>
        <input type="submit" value="Login">
    </form>
</div>
</body>
</html>
