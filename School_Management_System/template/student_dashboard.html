<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Student Dashboard</title>
    <style>
        body {
            background-color: black;
        }
        h1 {
            text-align: center;
            padding: 20px 0;
            color: red;
            font-family: 'Times New Roman', Times, serif;
            font-size: 50px;
            font-weight: 550;
        }
        form {
            text-align: center;
            padding: 133px 0;
            font-family: 'Times New Roman', Times, serif;
            font-size: 27px;
        }
        .profile-picture-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
        }
        p{
        font-family: 'Times New Roman', Times, serif;
            font-size: 24px;
            color: cyan;
        }
    </style>
</head>
<body>
    <h1>Welcome, {{ request.user.username }}</h1>
    <div class="profile-picture-container">
        {% if request.user.student.profile_picture %}
            <img src="{{ request.user.student.profile_picture.url }}" alt="Profile Picture" class="img-fluid rounded-circle" style="max-width: 25%; max-height: 25%;">
        {% endif %}
    </div>
    <p class="text-center">This is the student dashboard.</p>
    <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <input type="submit" value="Logout" class="btn btn-danger">
    </form>
</body>
</html>
