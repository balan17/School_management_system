<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Update Staff</title>
    {% load static %}
    <style>
        body,
        html {
            height: 100%;
        }

        .main {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: black;
            min-height: 100vh;
        }

        .form-container {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            color: cyan;
            padding: 20px;
        }

        .image-container {
            background-image: url('{% static 'teach.jpg' %}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 10px;
            width: 100%;
            height: 100%;
            min-height: 400px;
        }

        label {
            font-family: 'Times New Roman', Times, serif;
            font-size: 18px;
        }

        input[type="text"],
        input[type="date"] {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        input[type="submit"] {
            width: 100%;
            padding: 8px;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #0056b3;
        }

        .text-center h1 {
            color: red;
            font-family: 'Times New Roman', Times, serif;
            font-size: 30px;
            font-weight: 550;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
<div class="container-fluid main">
        <div class="row w-100">

            <div class="col-md-6 p-5">
                <div class="image-container">
                </div>
            </div>

            <div class="col-md-5 p-3 d-flex align-items-center">
                <div class="container form-container">
                    <h1>Update Staff</h1>
                    <form method="post">
                        {% csrf_token %}
                            <div class="mb-3">
                                <label for="staff_name" class="form-label">Staff Name:</label>
                                <input type="text" class="form-control" id="staff_name" name="staff_name" value="{{ staff.staff_name }}"
                                    required>
                            </div>
                            <div class="mb-3">
                                <label for="staff_salary" class="form-label">Staff Salary:</label>
                                <input type="text" class="form-control" id="staff_salary" name="staff_salary"
                                    value="{{ staff.staff_salary }}" required>
                            </div>
                            <div class="mb-3">
                                <label for="staff_work" class="form-label">Staff Work:</label>
                                <input type="text" class="form-control" id="staff_work" name="staff_work" value="{{ staff.staff_work }}"
                                    required>
                            </div>
                            <div class="text-center">
                                <button type="submit" class="btn btn-primary w-100">Update</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-cw7zVHVpWkFl6AKFPCAIjL7HHF8Of8NfJ+LFgpo5uWl7g6VC93SpI13Z7WJNApdc" crossorigin="anonymous">
    </script>
</body>

</html>
