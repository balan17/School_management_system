<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Students</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <style>
       body {
    background-color: black;
    color: white;
    margin: 0;
    font-family: 'Times New Roman', Times, serif;
}
        h1 {
            margin-bottom: 20px;
            font-family: 'Times New Roman', Times, serif;
            color: red;
        }

        .table-container {
            width: 60%;
            max-width: 600px;
            margin: 0 auto;
        }
        table {
            width: 80%;
            border-collapse: collapse;
            border-radius: 30px; /* Minimal border radius for table edges */
            overflow: hidden;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #333;
        }

        a.btn, button.btn {
            margin-right: 5px;
            border-radius: 10px; /* Minimal border radius for buttons */
        }
        .custom-navbar {
            background: linear-gradient(90deg, #0d1b2a, #1b263b, #415a77);
            padding-top: 18px;
            padding-bottom: 18px;
        }
        /* Brand style */
        .navbar-brand {
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        /* Menu items */
        .nav-link {
            font-family: 'Times New Roman', Times, serif;
            font-size: 24px;
            font-weight: 600;
            color: white !important;
            padding-left: 22px !important;
            padding-right: 22px !important;
            transition: 0.3s;
        }
        /* Hover effect */
        .nav-link:hover {
            color: #ffd60a !important;
            transform: scale(1.05);
        }
        .page-content{
    min-height: calc(100vh - 80px);
    display:flex;
    flex-direction:column;
    justify-content:center;
    text-align:center;
}
.custom-navbar{
    width:100%;
}
/* Table styling */
.table{
    border-radius:20px;
    overflow:hidden;
}
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark custom-navbar shadow sticky-top">
    <div class="container">

        <a class="navbar-brand" href="#">🎓 My Portal</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbar">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'admin_login' %}">Admin</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'staff_login' %}">Staff</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'student_login' %}">Student</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-danger fw-bold" href="{% url 'home' %}">
                        Logout
                    </a>
                </li>

            </ul>
        </div>
    </div>
</nav>
<div class="page-content">
    <h1>All Students</h1>
    <div class="table-container">
    <table class="table table-bordered table-dark">
        <thead>
            <tr>
                <th>Student Name</th>
                <th>Student Fees</th>
                <th>Joining Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for student in students %}
            <tr>
                <td>{{ student.student_name }}</td>
                <td>{{ student.student_fees }}</td>
                <td>{{ student.joining_date }}</td>
                <td>
                    <a href="{% url 'update_student' student.id %}" class="btn btn-warning btn-sm">Update</a>
                    <form action="{% url 'delete_student' student.id %}" method="post" style="display: inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure you want to delete this student?')">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
        </div>
</div>
</body>
</html>
